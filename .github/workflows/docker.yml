name: Build and Push Docker Image

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Write version.py into build context
        run: |
          echo "VERSION='${VERSION}'" > version.py
          echo "Generated version.py:"
          cat version.py
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/dellanx/salad-monitor:latest \
            -t ghcr.io/dellanx/salad-monitor:${GITHUB_REF#refs/tags/} .

      - name: Push image
        run: |
          docker push ghcr.io/dellanx/salad-monitor:latest
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            docker push ghcr.io/dellanx/salad-monitor:${GITHUB_REF#refs/tags/}
          fi
